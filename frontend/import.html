<div class="app-container fgc-page" data-import-page>
	<div class="container-fluid px-3 px-lg-4">
		<header class="fgc-page-header row g-3 align-items-end my-3 p-3">
			<div class="col-12 col-md">
				<p class="fgc-kicker" data-i18n="import_kicker">Tournament Control</p>
				<h1 class="fgc-title" data-i18n="import_title">Import</h1>
			</div>
		</header>

		<section class="fgc-panel border rounded p-3">
			<div class="row g-3 align-items-center mb-3">
				<div class="col-12 col-md">
					<p class="fgc-kicker" data-i18n="import_integrations_kicker">Providers</p>
					<h2 class="fgc-title fs-4 lh-sm m-0" data-i18n="import_integrations_title">API keys</h2>
				</div>
			</div>
			<form class="row g-3 align-items-end" data-import-integrations-form>
				<label class="col-12 col-xl m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="import_startgg_key">start.gg API key</span>
					<input class="form-control" type="password" name="startgg_api_key" autocomplete="off" spellcheck="false" />
				</label>
				<div class="col-12 col-sm-auto d-flex flex-column flex-sm-row gap-2">
					<button class="btn btn-outline-light d-inline-flex gap-2 align-items-center justify-content-center" type="submit" data-import-integrations-save>
						<i class="fas fa-key" aria-hidden="true"></i>
						<span data-i18n="import_save_integrations">Save API keys</span>
					</button>
				</div>
				<div class="col-12">
					<p class="m-0 small" data-muted-text data-i18n="import_integrations_hint">Saved locally to data/integrations.json and ignored by Git.</p>
				</div>
			</form>
		</section>

		<section class="fgc-panel border rounded p-3 mt-3">
			<form class="row g-3 align-items-end" data-import-form>
				<label class="col-12 col-xl m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="import_url">Tournament link</span>
					<input class="form-control" type="url" name="url" autocomplete="off" placeholder="https://www.start.gg/tournament/.../event/..." />
				</label>
				<div class="col-12 col-sm-auto d-flex flex-column flex-sm-row gap-2">
					<button class="btn btn-outline-light d-inline-flex gap-2 align-items-center justify-content-center" type="submit" data-import-preview>
						<i class="fas fa-magnifying-glass" aria-hidden="true"></i>
						<span data-i18n="import_preview">Preview</span>
					</button>
					<button class="btn btn-danger d-inline-flex gap-2 align-items-center justify-content-center" type="button" data-import-apply disabled>
						<i class="fas fa-file-import" aria-hidden="true"></i>
						<span data-i18n="import_apply">Import event and players</span>
					</button>
				</div>
			</form>
		</section>

		<section class="fgc-panel border rounded p-3 mt-3">
			<div class="row g-3 align-items-center mb-3">
				<div class="col-12 col-md">
					<p class="fgc-kicker" data-i18n="import_preview_kicker">External Data</p>
					<h2 class="fgc-title fs-4 lh-sm m-0" data-i18n="import_preview_title">Preview</h2>
				</div>
			</div>
			<div class="row g-3" data-import-preview-body>
				<div class="col-12">
					<div class="fgc-empty border rounded p-3 text-center" data-i18n="import_empty">Paste a tournament link to preview imported data.</div>
				</div>
			</div>
		</section>
	</div>
</div>

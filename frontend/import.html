<div class="app-container fgc-page" data-import-page>
	<div class="container-fluid px-3 px-lg-4 py-3">
		<header class="fgc-page-header row g-3 align-items-end mb-3 p-3">
			<div class="col-12 col-md">
				<p class="fgc-kicker" data-i18n="import.kicker">Tournament Control</p>
				<h1 class="fgc-title" data-i18n="import.title">Import</h1>
			</div>
		</header>

		<section class="fgc-panel border rounded mb-3 p-3">
			<div class="row g-3 align-items-center mb-3" data-section-heading>
				<div class="col-12 col-md">
					<p class="fgc-kicker" data-i18n="import.integrations.kicker">Providers</p>
					<h2 class="fgc-title fs-5 lh-sm m-0" data-i18n="import.integrations.title">API keys</h2>
				</div>
			</div>
			<form class="row g-3 align-items-end" data-import-integrations-form>
				<label class="col-12 col-xl m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="import.startgg_key">start.gg API key</span>
					<input class="form-control" type="password" name="startgg_api_key" autocomplete="off" spellcheck="false" title="Edit start.gg API key" data-i18n-title="import.startgg_key.title" data-i18n-label="import.startgg_key.title" />
				</label>
				<div class="col-12 d-flex flex-column flex-sm-row gap-2 justify-content-end">
					<button class="btn btn-outline-light d-inline-flex gap-2 align-items-center justify-content-center" type="submit" data-import-integrations-save title="Save provider API keys" data-i18n-title="import.save_integrations.title" data-i18n-label="import.save_integrations.title">
						<i class="fas fa-key" aria-hidden="true"></i>
						<span data-i18n="import.save_integrations">Save API keys</span>
					</button>
				</div>
			</form>
		</section>

		<section class="fgc-panel border rounded mb-3 p-3">
			<form class="row g-3 align-items-end" data-import-form>
				<label class="col-12 col-md-3 col-xl-2 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="import.provider">Provider</span>
					<select class="form-select" name="provider" data-enhance="select2" title="Choose import provider" data-i18n-title="import.provider.title" data-i18n-label="import.provider.title"></select>
				</label>
				<label class="col-12 col-md m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="import.url">Tournament link</span>
					<input class="form-control" type="url" name="url" autocomplete="off" placeholder="https://www.start.gg/tournament/.../event/..." title="Paste tournament link" data-i18n-title="import.url.title" data-i18n-label="import.url.title" />
				</label>
				<div class="col-12 col-sm-auto d-flex flex-column flex-sm-row gap-2">
					<button class="btn btn-outline-light d-inline-flex gap-2 align-items-center justify-content-center" type="submit" data-import-preview title="Preview tournament import" data-i18n-title="import.preview_button.title" data-i18n-label="import.preview_button.title">
						<i class="fas fa-magnifying-glass" aria-hidden="true"></i>
						<span data-i18n="import.preview">Preview</span>
					</button>
					<button class="btn btn-danger d-inline-flex gap-2 align-items-center justify-content-center" type="button" data-import-apply disabled title="Import previewed event and players" data-i18n-title="import.apply.title" data-i18n-label="import.apply.title">
						<i class="fas fa-file-import" aria-hidden="true"></i>
						<span data-i18n="import.apply">Import</span>
					</button>
					<button class="btn btn-outline-warning d-inline-flex gap-2 align-items-center justify-content-center" type="button" data-import-undo disabled title="Undo the last import" data-i18n-title="import.undo.title" data-i18n-label="import.undo.title">
						<i class="fas fa-rotate-left" aria-hidden="true"></i>
						<span data-i18n="import.undo">Undo</span>
					</button>
				</div>
			</form>
		</section>

		<section class="fgc-panel border rounded mb-3 p-3">
			<div class="row g-3 align-items-center mb-3" data-section-heading>
				<div class="col-12 col-md">
					<p class="fgc-kicker" data-i18n="import.preview.kicker">External Data</p>
					<h2 class="fgc-title fs-5 lh-sm m-0" data-i18n="import.preview.title">Preview</h2>
				</div>
			</div>
			<div class="row g-3" data-import-preview-body>
				<div class="col-12">
					<div class="fgc-empty border rounded p-3 text-center" data-i18n="import.empty">Paste a tournament link to preview imported data.</div>
				</div>
			</div>
		</section>
	</div>
</div>

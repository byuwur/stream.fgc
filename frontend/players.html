<div class="app-container fgc-page" data-player-page>
	<div class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
		<header class="fgc-page-header sticky-top row g-3 align-items-end mb-3 p-3">
			<div class="col-12 col-md">
				<p class="fgc-kicker" data-i18n="players_kicker">Tournament Control</p>
				<h1 class="fgc-title" data-i18n="players_title">Players</h1>
			</div>
			<div class="col-12 col-md-auto d-flex flex-column flex-sm-row gap-2 align-items-stretch align-items-sm-center justify-content-md-end">
				<div class="fgc-status d-inline-flex gap-2 align-items-center justify-content-start flex-shrink-0 border rounded px-3 py-2 text-start" data-player-status data-tone="neutral" data-i18n="players_status_loading">Loading players...</div>
				<div class="custom-control custom-toggle custom-toggle-sm fgc-toggle">
					<input id="players-autosave-toggle" class="custom-control-input" type="checkbox" data-autosave-toggle checked />
					<label class="custom-control-label" for="players-autosave-toggle">
						<span data-i18n="autosave_toggle">Autosave</span>
					</label>
				</div>
			</div>
		</header>

		<section class="fgc-panel border rounded p-3">
			<div class="row g-3 align-items-center mb-3">
				<p class="col-12 col-md m-0 small" data-muted-text data-i18n="players_hint">Edit player information and save each player.</p>
				<div class="col-12 col-sm-auto ms-md-auto">
					<button class="btn btn-outline-light w-100" type="button" data-players-reload>
						<i class="fas fa-rotate-right" aria-hidden="true"></i>
						<span data-i18n="players_reload">Reload</span>
					</button>
				</div>
			</div>
			<div class="row g-3" data-player-list></div>
		</section>
	</div>
</div>

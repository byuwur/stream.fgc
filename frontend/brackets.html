<div class="app-container fgc-page" data-bracket-page>
	<div class="container-fluid px-3 px-lg-4 py-3">
		<header class="fgc-page-header row g-3 align-items-end mb-3 p-3">
			<div class="col-12 col-md">
				<p class="fgc-kicker" data-i18n="bracket_kicker">Tournament Control</p>
				<h1 class="fgc-title" data-i18n="bracket_title">Bracket</h1>
			</div>
		</header>

		<section class="fgc-panel border rounded mb-3 p-3">
			<div class="row g-3 align-items-end mb-3">
				<label class="col-12 col-md-4 col-xl-3 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="bracket_overlay_view">Overlay view</span>
					<select class="form-select" data-enhance="select2" data-bracket-overlay-view-select></select>
				</label>
				<label class="col-12 col-md-4 col-xl-3 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="bracket_manager_view">Manager view</span>
					<select class="form-select" data-enhance="select2" data-bracket-manager-view-select></select>
				</label>
				<div class="col-12 col-xl-auto ms-xl-auto d-flex flex-column flex-sm-row gap-2">
					<a class="btn btn-outline-light d-inline-flex gap-2 align-items-center justify-content-center" href="./bracket.html" target="_blank" rel="noopener">
						<i class="fas fa-display" aria-hidden="true"></i>
						<span data-i18n="bracket_open_overlay">Open overlay</span>
					</a>
					<button class="btn btn-outline-warning d-inline-flex gap-2 align-items-center justify-content-center" type="button" data-bracket-action data-bracket-randomize>
						<i class="fas fa-shuffle" aria-hidden="true"></i>
						<span data-i18n="bracket_randomize">Randomize</span>
					</button>
					<button class="btn btn-outline-danger d-inline-flex gap-2 align-items-center justify-content-center" type="button" data-bracket-action data-bracket-reset>
						<i class="fas fa-rotate-left" aria-hidden="true"></i>
						<span data-i18n="bracket_reset">Reset</span>
					</button>
				</div>
				<div class="col-12">
					<p class="m-0 small" data-muted-text data-bracket-summary data-i18n="bracket_loading">Loading bracket...</p>
				</div>
			</div>
			<div class="row g-3" data-bracket-board>
				<div class="col-12">
					<div class="fgc-empty border rounded p-3 text-center" data-i18n="bracket_loading">Loading bracket...</div>
				</div>
			</div>
		</section>
	</div>
</div>

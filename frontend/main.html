<div class="app-container fgc-page">
	<div class="container-fluid px-3 px-lg-4 py-3">
		<header class="fgc-page-header row g-3 align-items-end mb-3 p-3">
			<div class="col-12 col-md">
				<p class="fgc-kicker" data-i18n="event.kicker">Tournament Control</p>
				<h1 class="fgc-title" data-i18n="event.title">Event</h1>
			</div>
		</header>

		<form class="fgc-panel fgc-event-form border rounded mb-3 p-3" data-event-form>
			<div class="row g-3">
				<label class="col-12 col-md-6 col-lg-4 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event.name">Name</span>
					<input class="form-control" type="text" name="name" autocomplete="off" title="Edit tournament name" data-i18n-title="event.name.title" data-i18n-label="event.name.title" />
				</label>

				<label class="col-12 col-md-6 col-lg-4 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event.phase">Phase</span>
					<input class="form-control" type="text" name="phase" autocomplete="off" title="Edit tournament phase" data-i18n-title="event.phase.title" data-i18n-label="event.phase.title" />
				</label>

				<label class="col-12 col-md-6 col-lg-4 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event.rule">Rule</span>
					<select class="form-select" name="rule" data-enhance="select2" title="Choose set rule" data-i18n-title="event.rule.title" data-i18n-label="event.rule.title"></select>
				</label>

				<label class="col-12 col-md-6 col-lg-4 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event.game">Game</span>
					<select class="form-select" name="game" data-enhance="select2" data-select-template="game" title="Choose tournament game" data-i18n-title="event.game.title" data-i18n-label="event.game.title"></select>
				</label>

				<label class="col-12 col-md-6 col-lg-4 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event.format">Format</span>
					<select class="form-select" name="format" data-enhance="select2" title="Choose bracket format" data-i18n-title="event.format.title" data-i18n-label="event.format.title"></select>
				</label>

				<label class="col-12 col-md-6 col-lg-4 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event.size">Size</span>
					<select class="form-select" name="size" data-enhance="select2" title="Choose tournament size" data-i18n-title="event.size.title" data-i18n-label="event.size.title"></select>
				</label>

				<div class="col-12 col-lg-5">
					<div class="border rounded p-3 h-100" data-event-asset="logo">
						<div class="row g-3 align-items-stretch">
							<div class="col-12 col-sm-4">
								<div class="w-100 overflow-hidden rounded border d-flex align-items-center justify-content-center" data-event-asset-preview-frame="logo">
									<img class="w-100 h-100 object-fit-contain" src="../players/_logo.png" alt="Tournament logo preview" data-i18n-alt="event.logo.alt" loading="lazy" data-event-asset-preview="logo" data-fallback-image />
								</div>
							</div>
							<div class="col-12 col-sm d-flex flex-column gap-3 justify-content-between">
								<div>
									<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event.logo">Tournament logo</span>
									<p class="m-0 small" data-muted-text data-i18n="event.logo.hint">Used by future overlays.</p>
								</div>
								<div class="d-flex flex-wrap gap-2 align-items-stretch">
									<div class="rounded px-3 py-2 d-inline-flex gap-2 align-items-center justify-content-center text-center" data-event-asset-dropzone="logo" role="button" tabindex="0" title="Upload tournament logo" data-i18n-title="event.logo.drop.title" data-i18n-label="event.logo.drop.title">
										<i class="fas fa-cloud-arrow-up" aria-hidden="true"></i>
										<span class="fw-bold" data-i18n="event.asset.drop">Drop or click image</span>
									</div>
									<button class="btn btn-outline-danger d-inline-flex gap-2 align-items-center justify-content-center" type="button" data-event-asset-remove="logo" title="Remove tournament logo" data-i18n-title="event.logo.remove.title" data-i18n-label="event.logo.remove.title">
										<i class="fas fa-trash" aria-hidden="true"></i>
										<span data-i18n="event.asset.remove">Remove image</span>
									</button>
								</div>
							</div>
						</div>
					</div>
				</div>

				<div class="col-12 col-lg-7">
					<div class="border rounded p-3 h-100" data-event-asset="background">
						<div class="row g-3 align-items-stretch">
							<div class="col-12 col-sm-5">
								<div class="w-100 overflow-hidden rounded border d-flex align-items-center justify-content-center" data-event-asset-preview-frame="background">
									<img class="w-100 h-100 object-fit-cover" src="../players/_bg.jpg" alt="Tournament background preview" data-i18n-alt="event.background.alt" loading="lazy" data-event-asset-preview="background" data-fallback-image />
								</div>
							</div>
							<div class="col-12 col-sm d-flex flex-column gap-3 justify-content-between">
								<div>
									<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event.background">Tournament background</span>
									<p class="m-0 small" data-muted-text data-i18n="event.background.hint">Used by future overlays.</p>
								</div>
								<div class="d-flex flex-wrap gap-2 align-items-stretch">
									<div class="rounded px-3 py-2 d-inline-flex gap-2 align-items-center justify-content-center text-center" data-event-asset-dropzone="background" role="button" tabindex="0" title="Upload tournament background" data-i18n-title="event.background.drop.title" data-i18n-label="event.background.drop.title">
										<i class="fas fa-cloud-arrow-up" aria-hidden="true"></i>
										<span class="fw-bold" data-i18n="event.asset.drop">Drop or click image</span>
									</div>
									<button class="btn btn-outline-danger d-inline-flex gap-2 align-items-center justify-content-center" type="button" data-event-asset-remove="background" title="Remove tournament background" data-i18n-title="event.background.remove.title" data-i18n-label="event.background.remove.title">
										<i class="fas fa-trash" aria-hidden="true"></i>
										<span data-i18n="event.asset.remove">Remove image</span>
									</button>
								</div>
							</div>
						</div>
					</div>
				</div>

				<div class="col-12 d-flex flex-wrap gap-2 justify-content-end">
					<button class="btn btn-danger" type="submit" data-manual-save title="Save event changes now" data-i18n-title="event.save.title" data-i18n-label="event.save.title">
						<i class="fas fa-save" aria-hidden="true"></i>
						<span data-i18n="event.save">Save now</span>
					</button>
				</div>
			</div>
		</form>

		<section class="fgc-panel border rounded mb-3 p-3" data-current-match>
			<div class="row g-3 align-items-center mb-3" data-section-heading>
				<div class="col-12 col-md">
					<p class="fgc-kicker" data-i18n="match.kicker">Playing now</p>
					<h2 class="fgc-title fs-5 lh-sm m-0" data-current-match-title data-i18n="match.title">Current match</h2>
				</div>
			</div>
			<div class="row g-3" data-current-match-body>
				<div class="col-12">
					<div class="fgc-empty border rounded p-3 text-center" data-i18n="match.loading">Loading current match...</div>
				</div>
			</div>
		</section>
	</div>
</div>

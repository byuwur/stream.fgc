<div class="app-container fgc-page">
	<div class="container-fluid px-3 px-lg-4 py-3">
		<header class="fgc-page-header row g-3 align-items-end mb-3 p-3">
			<div class="col-12 col-md">
				<p class="fgc-kicker" data-i18n="event_kicker">Tournament Control</p>
				<h1 class="fgc-title" data-i18n="event_title">Event</h1>
			</div>
		</header>

		<form class="fgc-panel fgc-event-form border rounded mb-3 p-3" data-event-form>
			<div class="row g-3">
				<label class="col-12 col-md-6 col-lg-4 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event_name">Name</span>
					<input class="form-control" type="text" name="name" autocomplete="off" title="Edit tournament name" data-i18n-title="event_name_title" data-i18n-label="event_name_title" />
				</label>

				<label class="col-12 col-md-6 col-lg-4 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event_phase">Phase</span>
					<input class="form-control" type="text" name="phase" autocomplete="off" title="Edit tournament phase" data-i18n-title="event_phase_title" data-i18n-label="event_phase_title" />
				</label>

				<label class="col-12 col-md-6 col-lg-4 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event_rule">Rule</span>
					<select class="form-select" name="rule" data-enhance="select2" title="Choose set rule" data-i18n-title="event_rule_title" data-i18n-label="event_rule_title"></select>
				</label>

				<label class="col-12 col-md-6 col-lg-4 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event_game">Game</span>
					<select class="form-select" name="game" data-enhance="select2" data-select-template="game" title="Choose tournament game" data-i18n-title="event_game_title" data-i18n-label="event_game_title"></select>
				</label>

				<label class="col-12 col-md-6 col-lg-4 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event_format">Format</span>
					<select class="form-select" name="format" data-enhance="select2" title="Choose bracket format" data-i18n-title="event_format_title" data-i18n-label="event_format_title"></select>
				</label>

				<label class="col-12 col-md-6 col-lg-4 m-0">
					<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event_size">Size</span>
					<select class="form-select" name="size" data-enhance="select2" title="Choose tournament size" data-i18n-title="event_size_title" data-i18n-label="event_size_title"></select>
				</label>

				<div class="col-12 col-lg-5">
					<div class="border rounded p-3 h-100" data-event-asset="logo">
						<div class="row g-3 align-items-stretch">
							<div class="col-12 col-sm-4">
								<div class="w-100 overflow-hidden rounded border d-flex align-items-center justify-content-center" data-event-asset-preview-frame="logo">
									<img class="w-100 h-100 object-fit-contain" src="/players/_logo.png" alt="Tournament logo preview" data-i18n-alt="event_logo_alt" loading="lazy" data-event-asset-preview="logo" data-fallback-image />
								</div>
							</div>
							<div class="col-12 col-sm d-flex flex-column gap-3 justify-content-between">
								<div>
									<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event_logo">Tournament logo</span>
									<p class="m-0 small" data-muted-text data-i18n="event_logo_hint">Used by future overlays.</p>
								</div>
								<div class="d-flex flex-wrap gap-2 align-items-stretch">
									<div class="rounded px-3 py-2 d-inline-flex gap-2 align-items-center justify-content-center text-center" data-event-asset-dropzone="logo" role="button" tabindex="0" title="Upload tournament logo" data-i18n-title="event_logo_drop_title" data-i18n-label="event_logo_drop_title">
										<i class="fas fa-cloud-arrow-up" aria-hidden="true"></i>
										<span class="fw-bold" data-i18n="event_asset_drop">Drop or click image</span>
									</div>
									<button class="btn btn-outline-danger d-inline-flex gap-2 align-items-center justify-content-center" type="button" data-event-asset-remove="logo" title="Remove tournament logo" data-i18n-title="event_logo_remove_title" data-i18n-label="event_logo_remove_title">
										<i class="fas fa-trash" aria-hidden="true"></i>
										<span data-i18n="event_asset_remove">Remove image</span>
									</button>
								</div>
							</div>
						</div>
					</div>
				</div>

				<div class="col-12 col-lg-7">
					<div class="border rounded p-3 h-100" data-event-asset="background">
						<div class="row g-3 align-items-stretch">
							<div class="col-12 col-sm-5">
								<div class="w-100 overflow-hidden rounded border d-flex align-items-center justify-content-center" data-event-asset-preview-frame="background">
									<img class="w-100 h-100 object-fit-cover" src="/players/_bg.jpg" alt="Tournament background preview" data-i18n-alt="event_background_alt" loading="lazy" data-event-asset-preview="background" data-fallback-image />
								</div>
							</div>
							<div class="col-12 col-sm d-flex flex-column gap-3 justify-content-between">
								<div>
									<span class="d-block mb-2 fw-bold" data-field-label data-i18n="event_background">Tournament background</span>
									<p class="m-0 small" data-muted-text data-i18n="event_background_hint">Used by future overlays.</p>
								</div>
								<div class="d-flex flex-wrap gap-2 align-items-stretch">
									<div class="rounded px-3 py-2 d-inline-flex gap-2 align-items-center justify-content-center text-center" data-event-asset-dropzone="background" role="button" tabindex="0" title="Upload tournament background" data-i18n-title="event_background_drop_title" data-i18n-label="event_background_drop_title">
										<i class="fas fa-cloud-arrow-up" aria-hidden="true"></i>
										<span class="fw-bold" data-i18n="event_asset_drop">Drop or click image</span>
									</div>
									<button class="btn btn-outline-danger d-inline-flex gap-2 align-items-center justify-content-center" type="button" data-event-asset-remove="background" title="Remove tournament background" data-i18n-title="event_background_remove_title" data-i18n-label="event_background_remove_title">
										<i class="fas fa-trash" aria-hidden="true"></i>
										<span data-i18n="event_asset_remove">Remove image</span>
									</button>
								</div>
							</div>
						</div>
					</div>
				</div>

				<div class="col-12 d-flex flex-wrap gap-2 justify-content-end">
					<button class="btn btn-danger" type="submit" data-manual-save title="Save event changes now" data-i18n-title="event_save_title" data-i18n-label="event_save_title">
						<i class="fas fa-save" aria-hidden="true"></i>
						<span data-i18n="event_save">Save now</span>
					</button>
				</div>
			</div>
		</form>

		<section class="fgc-panel border rounded mb-3 p-3" data-current-match>
			<div class="row g-3 align-items-center mb-3" data-section-heading>
				<div class="col-12 col-md">
					<p class="fgc-kicker" data-i18n="match_kicker">Playing now</p>
					<h2 class="fgc-title fs-5 lh-sm m-0" data-current-match-title data-i18n="match_title">Current match</h2>
				</div>
			</div>
			<div class="row g-3" data-current-match-body>
				<div class="col-12">
					<div class="fgc-empty border rounded p-3 text-center" data-i18n="match_loading">Loading current match...</div>
				</div>
			</div>
		</section>
	</div>
</div>
